name: Build Windows executable and upload to Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag name of the release to upload to
        required: true
        type: string
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install nuitka
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt } else { python -m pip install numpy matplotlib }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          python -m nuitka --standalone --onefile --assume-yes-for-downloads --enable-plugin=tk-inter --output-dir=dist --output-filename=Caffeine.exe caffeine.py

      - name: List dist
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Get-ChildItem -Force dist
          } else {
            Write-Error "dist directory was not created. Build may have failed; check Nuitka output above."
          }

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name || github.ref_name }}
          files: dist/Caffeine.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
