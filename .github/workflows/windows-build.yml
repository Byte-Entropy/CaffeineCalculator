name: Build Windows executable and upload to Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag name of the release to upload to
        required: true
        type: string
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --name Caffeine caffeine.py

      - name: List dist
        shell: pwsh
        run: |
          Get-ChildItem -Force dist

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name || github.ref_name }}
          files: dist/Caffeine.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
